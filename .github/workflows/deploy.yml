name: Flutter Web Deploy with Auto Secrets

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.7.8'

      - name: Check if secrets are defined
        run: |
          for var in EMAILJS_SERVICE_ID EMAILJS_TEMPLATE_ID EMAILJS_PUBLIC_KEY MAILBOXLAYER_API_KEY EMAILJS_URL; do
            if [ -z "${!var}" ]; then
              echo "❌ Secret $var is NOT set in GitHub repository settings."
              exit 1
            else
              echo "✅ Secret $var is set."
            fi
          done
        env:
          EMAILJS_SERVICE_ID: ${{ secrets.EMAILJS_SERVICE_ID }}
          EMAILJS_TEMPLATE_ID: ${{ secrets.EMAILJS_TEMPLATE_ID }}
          EMAILJS_PUBLIC_KEY: ${{ secrets.EMAILJS_PUBLIC_KEY }}
          MAILBOXLAYER_API_KEY: ${{ secrets.MAILBOXLAYER_API_KEY }}
          EMAILJS_URL: ${{ secrets.EMAILJS_URL }}


      - name: Build Flutter Web with all secrets
        run: |
          DART_DEFINES=""
          DART_DEFINES="$DART_DEFINES --dart-define=EMAILJS_SERVICE_ID=${EMAILJS_SERVICE_ID}"
          DART_DEFINES="$DART_DEFINES --dart-define=EMAILJS_TEMPLATE_ID=${EMAILJS_TEMPLATE_ID}"
          DART_DEFINES="$DART_DEFINES --dart-define=EMAILJS_PUBLIC_KEY=${EMAILJS_PUBLIC_KEY}"
          DART_DEFINES="$DART_DEFINES --dart-define=MAILBOXLAYER_API_KEY=${MAILBOXLAYER_API_KEY}"
          DART_DEFINES="$DART_DEFINES --dart-define=EMAILJS_URL=${EMAILJS_URL}"
          flutter build web $DART_DEFINES
        env:
          EMAILJS_SERVICE_ID: ${{ secrets.EMAILJS_SERVICE_ID }}
          EMAILJS_TEMPLATE_ID: ${{ secrets.EMAILJS_TEMPLATE_ID }}
          EMAILJS_PUBLIC_KEY: ${{ secrets.EMAILJS_PUBLIC_KEY }}
          MAILBOXLAYER_API_KEY: ${{ secrets.MAILBOXLAYER_API_KEY }}
          EMAILJS_URL: ${{secrets.EMAILJS_URL}}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/web
